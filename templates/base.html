<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>{% block title %}{{ title }} · Ventauri{% endblock %}</title>
  <script>
    (function () {
      try {
        var t = localStorage.getItem("ventauri-theme");
        if (t !== "light" && t !== "dark") {
          t = window.matchMedia("(prefers-color-scheme: light)").matches ? "light" : "dark";
        }
        document.documentElement.setAttribute("data-theme", t);
      } catch (e) {
        document.documentElement.setAttribute("data-theme", "dark");
      }
    })();
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/static/app.css" />
</head>
<body>
  <div class="bg-mesh" aria-hidden="true"></div>
  <header class="top">
    <a href="/dashboard" class="brand" aria-label="Ventauri home">
      <span class="brand-mark" aria-hidden="true">
        <svg width="28" height="28" viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg">
          <circle cx="16" cy="16" r="14" stroke="url(#vm)" stroke-width="1.5" opacity="0.5"/>
          <circle cx="16" cy="10" r="3" fill="url(#vm)"/>
          <path d="M10 22c2-4 10-4 12 0" stroke="url(#vm)" stroke-width="1.5" stroke-linecap="round"/>
          <defs>
            <linearGradient id="vm" x1="4" y1="4" x2="28" y2="28" gradientUnits="userSpaceOnUse">
              <stop stop-color="#2dd4bf"/>
              <stop offset="1" stop-color="#a78bfa"/>
            </linearGradient>
          </defs>
        </svg>
      </span>
      <span class="brand-text">Ventauri</span>
    </a>
    <div class="top-right">
      <button type="button" class="theme-toggle" id="theme-toggle" aria-label="Switch theme" title="Dark / light appearance">
        <svg class="theme-icon theme-icon-sun" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <circle cx="12" cy="12" r="4"/>
          <path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M6.34 17.66l-1.41 1.41M19.07 4.93l-1.41 1.41"/>
        </svg>
        <svg class="theme-icon theme-icon-moon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
        </svg>
      </button>
      <nav class="nav" aria-label="Main">
        <a class="nav-link" href="/dashboard">Dashboard</a>
        <a class="nav-link" href="/dashboard/agents">Agents</a>
        <a class="nav-link nav-link-accent" href="/dashboard/run">Run</a>
        <a class="nav-link" href="/dashboard/sessions">Sessions</a>
        <a class="nav-link nav-link-muted" href="/docs">API</a>
      </nav>
    </div>
  </header>
  <main class="main">
    {% block content %}{% endblock %}
  </main>
  <footer class="foot">
    <span class="foot-inner muted">Local store <code>data/ventauri.db</code> · OpenAPI <a href="/docs">/docs</a></span>
  </footer>
  <script>
    (function () {
      var btn = document.getElementById("theme-toggle");
      if (!btn) return;
      function label() {
        var t = document.documentElement.getAttribute("data-theme") || "dark";
        btn.setAttribute("aria-label", t === "dark" ? "Switch to light mode" : "Switch to dark mode");
        btn.setAttribute("title", t === "dark" ? "Use light appearance" : "Use dark appearance");
      }
      function apply(next) {
        document.documentElement.setAttribute("data-theme", next);
        try {
          localStorage.setItem("ventauri-theme", next);
        } catch (e) {}
        label();
      }
      btn.addEventListener("click", function () {
        var cur = document.documentElement.getAttribute("data-theme") || "dark";
        apply(cur === "dark" ? "light" : "dark");
      });
      label();
    })();
  </script>
</body>
</html>
