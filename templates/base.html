<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>{% block title %}{{ title }} · Ventauri{% endblock %}</title>
  <link rel="stylesheet" href="/static/app.css" />
</head>
<body>
  <header class="top">
    <a href="/dashboard" class="brand">Ventauri</a>
    <nav class="nav">
      <a href="/dashboard">Dashboard</a>
      <a href="/dashboard/agents">Agents</a>
      <a href="/dashboard/run">Run workflow</a>
      <a href="/dashboard/sessions">Sessions</a>
      <a href="/docs" class="muted">API docs</a>
    </nav>
  </header>
  <main class="main">
    {% block content %}{% endblock %}
  </main>
  <footer class="foot muted">Local data: <code>data/ventauri.db</code></footer>
</body>
</html>
